<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <title>Ischia Excursions 2026 | Programme from 1 April</title>
  <meta name="description" content="Ischia excursion programme 2026 from 1 April: Capri, Procida, Positano, Amalfi, Sorrento, Pompeii, Caserta. Updated prices and days.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://www.ischiatransferservice.it/en/excursions">
  <link rel="alternate" hreflang="it" href="https://www.ischiatransferservice.it/escursioni">
  <link rel="alternate" hreflang="en" href="https://www.ischiatransferservice.it/en/excursions">
  <link rel="alternate" hreflang="x-default" href="https://www.ischiatransferservice.it/escursioni">
  <meta property="og:title" content="Ischia Excursions 2026 | Programme from 1 April">
  <meta property="og:description" content="Capri, Procida, Positano, Amalfi, Sorrento, Pompeii and Caserta. Updated prices and days for the 2026 season.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="../assets/ischia-bg.jpg">
  <meta property="og:url" content="https://www.ischiatransferservice.it/en/excursions">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="../assets/ischia-bg.jpg">
  <link href="../styles/generated.css" rel="stylesheet">
  <style>
    .exc-day-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #e7f1ff;
      color: #1e3a8a;
      margin: 2px 2px 2px 0;
    }
    .exc-price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #00204a;
      line-height: 1;
    }
    .exc-includes {
      font-size: 0.82rem;
      color: #374151;
      margin-top: 6px;
    }
    .exc-includes strong {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      display: block;
      margin-bottom: 2px;
    }
    .exc-notes {
      font-size: 0.78rem;
      color: #9ca3af;
      margin-top: 6px;
      font-style: italic;
    }
    #exc-grid { min-height: 200px; }
  </style>
</head>
<body class="bg-marbleWhite text-gray-900">
  <header class="fixed inset-x-0 top-0 z-50">
    <nav id="site-nav" class="nav-shell">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
        <a href="index.html" class="flex items-center gap-3 text-nightBlue">
          <span class="flex h-11 w-11 items-center justify-center rounded-full bg-nightBlue text-sm font-semibold tracking-[0.28em] text-marbleWhite">ITS</span>
          <span class="block text-sm font-semibold sm:text-base">I.T.S. Ischia Transfer Service</span>
        </a>
        <div class="hidden items-center gap-6 lg:flex">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="contacts.html">Contacts</a>
          <a class="nav-link" href="../escursioni.html">IT</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="pt-32 pb-20">
    <section class="section-shell pt-10">
      <div class="section-heading">
        <span class="eyebrow">Excursions</span>
        <h1 id="exc-title">Excursion programme 2026</h1>
        <p id="exc-subtitle">Loading…</p>
      </div>

      <div id="exc-grid" class="mx-auto grid max-w-7xl gap-6 px-6 md:grid-cols-2 xl:grid-cols-3 lg:px-8">
        <p class="text-gray-400 text-sm col-span-full text-center py-10">Loading excursions…</p>
      </div>

      <div class="mx-auto mt-10 max-w-7xl px-6 lg:px-8">
        <article class="service-card">
          <h2 class="text-xl font-semibold text-nightBlue">Operating note</h2>
          <p id="exc-note" class="mt-2 text-gray-600 text-sm"></p>
          <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:justify-start">
            <a class="btn-secondary btn-whatsapp justify-center" href="https://wa.me/390813331053" target="_blank" rel="noopener noreferrer">WhatsApp</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script>
    const DAY_IT_TO_EN = {
      'Lunedì': 'Monday', 'Martedì': 'Tuesday', 'Mercoledì': 'Wednesday',
      'Giovedì': 'Thursday', 'Venerdì': 'Friday', 'Sabato': 'Saturday', 'Domenica': 'Sunday'
    };
    const ORDER = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];

    fetch('/api/escursioni')
      .then((r) => r.json())
      .then((data) => {
        const grid = document.getElementById('exc-grid');
        const subtitle = document.getElementById('exc-subtitle');
        const noteEl = document.getElementById('exc-note');

        if (data.validFrom) {
          const [y, m, d] = data.validFrom.split('-');
          subtitle.textContent = 'In effect from ' + d + '/' + m + '/' + y;
        } else {
          subtitle.textContent = '';
        }

        noteEl.textContent = data.note
          ? data.note.replace('Le escursioni si effettuano al raggiungimento di un minimo di 20 partecipanti.', 'Excursions take place when a minimum of 20 participants is reached.')
              .replace('Prenotazioni:', 'Bookings:')
          : '';

        const items = (data.items || []).filter((i) => i.visible !== false);
        if (!items.length) {
          grid.innerHTML = '<p class="text-gray-400 text-sm col-span-full text-center py-10">No excursions available at the moment.</p>';
          return;
        }

        items.sort((a, b) => {
          const ia = Math.min(...(a.days || []).map((d) => ORDER.indexOf(d)).filter((n) => n >= 0));
          const ib = Math.min(...(b.days || []).map((d) => ORDER.indexOf(d)).filter((n) => n >= 0));
          return ia - ib;
        });

        grid.innerHTML = items.map((item) => {
          const badges = (item.days || []).map((d) => `<span class="exc-day-badge">${DAY_IT_TO_EN[d] || d}</span>`).join('');
          const priceStr = item.priceNote ? item.priceNote : (item.price ? `€${Number(item.price).toFixed(0)}` : '');
          const includesHtml = item.includes
            ? `<div class="exc-includes"><strong>Included</strong>${item.includes}</div>`
            : '';
          const notesHtml = item.notes
            ? `<p class="exc-notes">${item.notes}</p>`
            : '';
          return `
            <article class="service-card flex flex-col">
              <div class="mb-2">${badges}</div>
              <h3 class="mt-0">${item.name}</h3>
              ${includesHtml}
              ${notesHtml}
              <div class="mt-auto pt-4">
                <span class="exc-price">${priceStr}</span>
              </div>
            </article>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('exc-grid').innerHTML =
          '<p class="text-red-500 text-sm col-span-full text-center py-10">Error loading excursions.</p>';
      });
  </script>
</body>
</html>
